# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # npm / pnpm dependencies (auto-detected via pnpm-lock.yaml)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      # Bundle non-major updates so we don't get a flood of PRs
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in .github/workflows/
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
